<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 재고·발주 시스템</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #ff6b35;
      --error: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px 0; color: var(--accent); }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.9rem; }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    .error { color: var(--error); font-size: 0.9rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>재고·발주 시스템</h1>
    <p class="sub">팀 비밀번호를 입력하세요.</p>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" required autofocus placeholder="비밀번호 입력">
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
